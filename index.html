<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>All Stars</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="All Stars">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.log('SW registration failed:', err);
          });
        });
      }

      (function () {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let _masterGain = null;
        window.__setMasterVolume = function (v) {
          v = Math.max(0, Math.min(1, v));
          if (_masterGain) _masterGain.gain.setTargetAtTime(v, _masterGain.context.currentTime, 0.02);
          try { localStorage.setItem('allstars_vol', v); } catch (_) {}
        };
        window.__getMasterVolume = function () {
          try { return parseFloat(localStorage.getItem('allstars_vol') ?? '1'); } catch (_) { return 1; }
        };
        function PatchedAC(...args) {
          const ctx = Reflect.construct(Ctx, args, PatchedAC);
          const gain = ctx.createGain();
          gain.gain.value = window.__getMasterVolume();
          gain.connect(ctx.destination);
          _masterGain = gain;
          Object.defineProperty(ctx, 'destination', { get: () => gain, configurable: true });
          return ctx;
        }
        PatchedAC.prototype = Ctx.prototype;
        Object.setPrototypeOf(PatchedAC, Ctx);
        if (window.AudioContext)       window.AudioContext       = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      })();
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      #unity-container {
        position: relative;
        flex-shrink: 0;
      }

      #unity-canvas {
        display: block;
        background: #111;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #loading-overlay {
        position: absolute;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
      #loading-overlay.hidden   { display: none; }

      #game-title {
        color: #fff;
        font-size: clamp(16px, 3vw, 28px);
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      #progress-track {
        width: min(240px, 55vw);
        height: 3px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: #fff;
        border-radius: 2px;
        transition: width 0.2s ease;
      }

      #status-text {
        color: #555;
        font-size: clamp(10px, 1.4vw, 12px);
        letter-spacing: 0.05em;
      }

      #unity-footer {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 4px 8px;
        background: rgba(0,0,0,0.35);
        pointer-events: none;
        z-index: 5;
      }
      #unity-build-title {
        color: #333;
        font-size: 11px;
        margin-right: 6px;
        pointer-events: none;
        user-select: none;
      }
      #unity-fullscreen-button {
        cursor: pointer;
        width: 30px; height: 30px;
        background: url('TemplateData/fullscreen-button.png') no-repeat center;
        background-size: contain;
        opacity: 0.45;
        transition: opacity 0.2s;
        pointer-events: all;
        filter: grayscale(1);
      }
      #unity-fullscreen-button:hover { opacity: 0.9; }

      #vol-panel {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 10px 6px;
        background: rgba(0,0,0,0.55);
        border-radius: 8px 0 0 8px;
        z-index: 20;
        transition: opacity 0.3s;
        opacity: 0;
        pointer-events: none;
      }
      #vol-panel.ready { opacity: 1; pointer-events: all; }
      :fullscreen #vol-panel,
      :-webkit-full-screen #vol-panel { display: none; }

      #vol-label {
        color: #888;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        user-select: none;
      }

      #vol-slider {
        writing-mode: vertical-lr;
        direction: rtl;
        width: 22px;
        height: 90px;
        cursor: pointer;
        accent-color: #fff;
      }

      #vol-pct {
        color: #666;
        font-size: 9px;
        user-select: none;
      }

      #unity-warning {
        position: absolute;
        left: 50%; top: 8%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        max-width: min(400px, 90%);
        text-align: center;
      }
      #unity-warning div {
        padding: 8px 14px;
        border-radius: 5px;
        font-size: 11px;
        color: #ccc;
        background: #1a1a1a;
        margin-bottom: 4px;
      }

      #crash-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.92);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 99;
        padding: 24px;
        text-align: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #fff;
      }
      #crash-overlay.visible { display: flex; }

      #crash-title {
        font-size: clamp(14px, 2.5vw, 20px);
        font-weight: 700;
        letter-spacing: 0.1em;
      }

      #crash-message {
        font-family: monospace;
        font-size: clamp(9px, 1.2vw, 11px);
        color: #888;
        max-width: 520px;
        width: 100%;
        word-break: break-word;
        white-space: pre-wrap;
        text-align: left;
        background: #111;
        border: 1px solid #222;
        border-radius: 4px;
        padding: 10px 14px;
        max-height: 200px;
        overflow-y: auto;
        line-height: 1.5;
      }

      #crash-countdown {
        font-size: clamp(10px, 1.3vw, 12px);
        color: #555;
        letter-spacing: 0.05em;
      }

      #crash-reload {
        margin-top: 4px;
        padding: 10px 28px;
        border: 1px solid #444;
        border-radius: 5px;
        background: #1a1a1a;
        color: #fff;
        font-size: clamp(11px, 1.4vw, 13px);
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.08em;
      }
      #crash-reload:hover { background: #222; }
    </style>
  </head>
  <body>

    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="loading-overlay">
        <div id="game-title">All Stars</div>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="status-text">Initializing…</div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-build-title">All Stars</div>
        <div id="unity-fullscreen-button" title="Fullscreen"></div>
      </div>

      <div id="crash-overlay">
        <div id="crash-title">Game Crashed</div>
        <div id="crash-message"></div>
        <div id="crash-countdown"></div>
        <button id="crash-reload" onclick="location.reload(true)">Reload Now</button>
      </div>
    </div>

    <div id="vol-panel">
      <div id="vol-label">Vol</div>
      <input id="vol-slider" type="range" min="0" max="100" value="100" step="1" title="Master Volume">
      <div id="vol-pct">100%</div>
    </div>

    <script>
      const GAME_ASPECT = 960 / 600;
      const DATA_URL = "https://media.githubusercontent.com/media/nulltronprime/openglwebbuild/main/Build/all%20stars%20webgl%20port.data";

      const container  = document.getElementById("unity-container");
      const canvas     = document.getElementById("unity-canvas");
      const overlay    = document.getElementById("loading-overlay");
      const statusEl   = document.getElementById("status-text");
      const progressEl = document.getElementById("progress-fill");
      const volPanel   = document.getElementById("vol-panel");
      const volSlider  = document.getElementById("vol-slider");
      const volPct     = document.getElementById("vol-pct");

      const savedVol = Math.round(window.__getMasterVolume() * 100);
      volSlider.value = savedVol;
      volPct.textContent = savedVol + "%";
      volSlider.addEventListener("input", () => {
        const v = parseInt(volSlider.value, 10);
        volPct.textContent = v + "%";
        window.__setMasterVolume(v / 100);
      });

      function setProgress(pct) { progressEl.style.width = Math.min(100, Math.round(pct)) + "%"; }
      function setStatus(msg)   { statusEl.textContent = msg; }

      function showWarning(msg, type) {
        const w = document.getElementById("unity-warning");
        const d = document.createElement("div");
        d.textContent = msg;
        w.appendChild(d);
        w.style.display = "block";
        if (type !== "error")
          setTimeout(() => { d.remove(); if (!w.children.length) w.style.display = "none"; }, 6000);
      }

      let _crashCountdownTimer = null;
      function showCrash(msg) {
        const el = document.getElementById("crash-overlay");
        if (el.classList.contains("visible")) return;

        const displayMsg = (!msg || msg === "undefined" || String(msg).trim() === "undefined")
          ? "Unity runtime exception.\nCheck browser console for details."
          : (typeof msg === "string" ? msg : JSON.stringify(msg, null, 2));

        document.getElementById("crash-message").textContent = displayMsg;
        el.classList.add("visible");

        let secs = 10;
        const cntEl = document.getElementById("crash-countdown");
        cntEl.textContent = `Auto-reloading in ${secs}s…`;
        _crashCountdownTimer = setInterval(() => {
          secs--;
          if (secs <= 0) {
            clearInterval(_crashCountdownTimer);
            location.reload(true);
          } else {
            cntEl.textContent = `Auto-reloading in ${secs}s…`;
          }
        }, 1000);
      }

      const _origAlert = window.alert.bind(window);
      window.alert = function (msg) {
        if (typeof msg === "string" &&
            (msg.toLowerCase().includes("error") ||
             msg.toLowerCase().includes("exception") ||
             msg.toLowerCase().includes("unity fatal"))) {
          showCrash(msg);
        } else {
          _origAlert(msg);
        }
      };

      const _origConsoleError = console.error.bind(console);
      console.error = function (...args) {
        _origConsoleError(...args);
        const msg = args.join(" ");
        if (msg.includes("Halting program") ||
            msg.includes("Uncaught exception from main loop") ||
            msg.includes("Invoking error handler due to") ||
            msg.includes("[AllStars] Unity fatal error")) {
          showCrash(msg);
        }
      };

      window.addEventListener("error", function (e) {
        const msg = (e.error ? e.error.stack || e.error.toString() : "") || e.message || String(e);
        if (msg.includes("wasm") || msg.includes("Unity") || msg.includes("Uncaught")) {
          showCrash(msg);
        }
      });

      try {
        const blob   = new Blob(["let iv=setInterval(()=>self.postMessage('t'),200);"], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = () => {};
      } catch (_) {}

      function resize() {
        const maxW = window.innerWidth;
        const maxH = window.innerHeight;
        let w, h;
        if (maxW / maxH > GAME_ASPECT) { h = maxH; w = Math.round(h * GAME_ASPECT); }
        else                           { w = maxW; h = Math.round(w / GAME_ASPECT); }
        container.style.width  = w + "px";
        container.style.height = h + "px";
        canvas.width  = w;
        canvas.height = h;
      }
      resize();
      window.addEventListener("resize", resize);

      async function fetchDataWithProgress(url) {
        setStatus("Connecting…");
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) throw new Error(`HTTP ${response.status} — ${url}`);
        const contentLength = parseInt(response.headers.get("Content-Length") || "0");
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;
        setStatus("Downloading… 0%");
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (contentLength > 0) {
            setProgress((received / contentLength) * 80);
            setStatus(`Downloading… ${Math.round(received / contentLength * 100)}%`);
          } else {
            setStatus(`Downloading… ${(received / 1048576).toFixed(1)} MB`);
          }
        }
        const total  = chunks.reduce((s, c) => s + c.length, 0);
        const merged = new Uint8Array(total);
        let   offset = 0;
        for (const c of chunks) { merged.set(c, offset); offset += c.length; }
        return URL.createObjectURL(new Blob([merged], { type: "application/octet-stream" }));
      }

      async function boot() {
        let dataObjectUrl;
        try {
          dataObjectUrl = await fetchDataWithProgress(DATA_URL);
        } catch (err) {
          const text = (err.stack || err.message || String(err));
          setStatus("Download failed");
          showCrash("Download failed:\n" + text);
          return;
        }

        setStatus("Starting…");
        setProgress(85);

        const buildUrl = "Build";
        const config = {
          arguments:                  [],
          dataUrl:                    dataObjectUrl,
          frameworkUrl:               buildUrl + "/all stars webgl port.framework.js",
          codeUrl:                    buildUrl + "/all stars webgl port.wasm",
          streamingAssetsUrl:         "StreamingAssets",
          companyName:                "Drippy Studios",
          productName:                "All Stars",
          productVersion:             "3.0.1",
          autoSyncPersistentDataPath: true,
          showBanner:                 showWarning,
        };

        await new Promise((resolve, reject) => {
          const s   = document.createElement("script");
          s.src     = buildUrl + "/all stars webgl port.loader.js";
          s.onload  = resolve;
          s.onerror = () => reject(new Error("Failed to load loader script"));
          document.body.appendChild(s);
        });

        setProgress(90);

        try {
          const unityInstance = await createUnityInstance(canvas, config, (progress) => {
            setProgress(90 + progress * 10);
            if (progress < 1) setStatus(`Loading… ${Math.round(90 + progress * 10)}%`);
          });

          URL.revokeObjectURL(dataObjectUrl);
          setProgress(100);

          overlay.classList.add("fade-out");
          setTimeout(() => overlay.classList.add("hidden"), 600);

          volPanel.classList.add("ready");

          document.getElementById("unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          resize();
        } catch (err) {
          const text = (err && err.stack) ? err.stack : String(err);
          setStatus("Error: " + text.split("\n")[0]);
          showCrash(text);
        }
      }

      boot();
    </script>
  </body>
</html>
