<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>All Stars</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="All Stars">

    <script>
      // ── Service Worker ────────────────────────────────────────────────────────
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.log('SW registration failed:', err);
          });
        });
      }

      // ── Audio intercept (must run BEFORE Unity loads) ─────────────────────────
      // Patches AudioContext so we can insert a master gain node for the volume
      // slider. Works regardless of how Unity internally manages audio.
      (function () {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;

        let _masterGain = null;

        window.__setMasterVolume = function (v) {
          v = Math.max(0, Math.min(1, v));
          if (_masterGain) _masterGain.gain.setTargetAtTime(v, _masterGain.context.currentTime, 0.02);
          try { localStorage.setItem('allstars_vol', v); } catch (_) {}
        };

        window.__getMasterVolume = function () {
          try { return parseFloat(localStorage.getItem('allstars_vol') ?? '1'); } catch (_) { return 1; }
        };

        function PatchedAC(...args) {
          // Use Reflect so all internal slots are initialised correctly
          const ctx = Reflect.construct(Ctx, args, PatchedAC);

          const gain = ctx.createGain();
          gain.gain.value = window.__getMasterVolume();
          gain.connect(ctx.destination);
          _masterGain = gain;

          // Re-route everything that connects to destination → our gain node
          Object.defineProperty(ctx, 'destination', { get: () => gain, configurable: true });

          return ctx;
        }

        PatchedAC.prototype = Ctx.prototype;
        Object.setPrototypeOf(PatchedAC, Ctx);

        if (window.AudioContext)       window.AudioContext       = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
      })();
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #0a0a0a;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      /* ── Game container ── */
      #unity-container {
        position: relative;
        flex-shrink: 0;
      }

      #unity-canvas {
        display: block;
        background: #111;
        width: 100%;
        height: 100%;
        touch-action: none; /* improves mobile touch */
      }

      /* ── Loading overlay ── */
      #loading-overlay {
        position: absolute;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading-overlay.fade-out  { opacity: 0; pointer-events: none; }
      #loading-overlay.hidden    { display: none; }

      #game-title {
        color: #fff;
        font-size: clamp(16px, 3vw, 28px);
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      #progress-track {
        width: min(240px, 55vw);
        height: 3px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4a9eff, #9b59ff);
        border-radius: 2px;
        transition: width 0.2s ease;
      }

      #status-text {
        color: #555;
        font-size: clamp(10px, 1.4vw, 12px);
        letter-spacing: 0.05em;
      }

      /* ── Footer (fullscreen btn) ── */
      #unity-footer {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 4px 8px;
        background: rgba(0,0,0,0.35);
        pointer-events: none;
        z-index: 5;
      }
      #unity-build-title {
        color: #333;
        font-size: 11px;
        margin-right: 6px;
        pointer-events: none;
        user-select: none;
      }
      #unity-fullscreen-button {
        cursor: pointer;
        width: 30px; height: 30px;
        background: url('TemplateData/fullscreen-button.png') no-repeat center;
        background-size: contain;
        opacity: 0.45;
        transition: opacity 0.2s;
        pointer-events: all;
      }
      #unity-fullscreen-button:hover { opacity: 0.9; }

      /* ── Volume slider (right side, hidden in fullscreen) ── */
      #vol-panel {
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 10px 6px;
        background: rgba(0,0,0,0.55);
        border-radius: 8px 0 0 8px;
        z-index: 20;
        transition: opacity 0.3s;
        /* hide while game not loaded */
        opacity: 0;
        pointer-events: none;
      }
      #vol-panel.ready {
        opacity: 1;
        pointer-events: all;
      }
      /* hide in fullscreen */
      :fullscreen #vol-panel,
      :-webkit-full-screen #vol-panel { display: none; }

      #vol-label {
        color: #888;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        user-select: none;
      }

      /* Vertical range input — standards-compliant, no deprecated appearance keyword */
      #vol-slider {
        writing-mode: vertical-lr;
        direction: rtl;
        width: 22px;
        height: 90px;
        cursor: pointer;
        accent-color: #4a9eff;
      }

      #vol-pct {
        color: #666;
        font-size: 9px;
        user-select: none;
      }

      /* ── Warning banner ── */
      #unity-warning {
        position: absolute;
        left: 50%; top: 8%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        max-width: min(400px, 90%);
        text-align: center;
      }
      #unity-warning div {
        padding: 8px 14px;
        border-radius: 5px;
        font-size: 11px;
        color: #333;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>

    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="loading-overlay">
        <div id="game-title">All Stars</div>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="status-text">Initializing…</div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-build-title">All Stars</div>
        <div id="unity-fullscreen-button" title="Fullscreen"></div>
      </div>
    </div>

    <!-- Volume panel sits outside the game container so it isn't clipped -->
    <div id="vol-panel">
      <div id="vol-label">Vol</div>
      <input id="vol-slider" type="range" min="0" max="100"
             value="100" step="1" title="Master Volume">
      <div id="vol-pct">100%</div>
    </div>

    <script>
      // ── Config ──────────────────────────────────────────────────────────────
      const GAME_ASPECT = 960 / 600;
      const DATA_URL =
        "https://media.githubusercontent.com/media/nulltronprime/openglwebbuild/main/Build/all%20stars%20webgl%20port.data";

      // ── Elements ─────────────────────────────────────────────────────────────
      const container  = document.getElementById("unity-container");
      const canvas     = document.getElementById("unity-canvas");
      const overlay    = document.getElementById("loading-overlay");
      const statusEl   = document.getElementById("status-text");
      const progressEl = document.getElementById("progress-fill");
      const volPanel   = document.getElementById("vol-panel");
      const volSlider  = document.getElementById("vol-slider");
      const volPct     = document.getElementById("vol-pct");

      // ── Volume UI ─────────────────────────────────────────────────────────────
      const savedVol = Math.round(window.__getMasterVolume() * 100);
      volSlider.value = savedVol;
      volPct.textContent = savedVol + "%";

      volSlider.addEventListener("input", () => {
        const v = parseInt(volSlider.value, 10);
        volPct.textContent = v + "%";
        window.__setMasterVolume(v / 100);
      });

      // ── Helpers ───────────────────────────────────────────────────────────────
      function setProgress(pct) {
        progressEl.style.width = Math.min(100, Math.round(pct)) + "%";
      }
      function setStatus(msg) {
        statusEl.textContent = msg;
      }
      function showWarning(msg, type) {
        const w = document.getElementById("unity-warning");
        const d = document.createElement("div");
        d.textContent = msg;
        d.style.background = type === "error" ? "#ffe0e0" : "#fffbe6";
        w.appendChild(d);
        w.style.display = "block";
        if (type !== "error")
          setTimeout(() => { d.remove(); if (!w.children.length) w.style.display = "none"; }, 6000);
      }

      // ── Responsive sizing ─────────────────────────────────────────────────────
      function resize() {
        const maxW = window.innerWidth;
        const maxH = window.innerHeight;
        let w, h;
        if (maxW / maxH > GAME_ASPECT) { h = maxH; w = Math.round(h * GAME_ASPECT); }
        else                           { w = maxW; h = Math.round(w / GAME_ASPECT); }
        container.style.width  = w + "px";
        container.style.height = h + "px";
        canvas.width  = w;
        canvas.height = h;
      }
      resize();
      window.addEventListener("resize", resize);

      // ── Save-data persistence via IndexedDB ───────────────────────────────────
      // Unity WebGL maps file I/O to an Emscripten IDBFS virtual filesystem.
      // Saves are only flushed to IndexedDB when FS.syncfs(false, cb) is called.
      // We reach the FS through unityInstance.Module (set after boot() completes).
      let _unityModule = null;   // set once Unity is loaded
      let _fsSyncBusy  = false;

      function persistSaves() {
        if (!_unityModule || !_unityModule.FS || _fsSyncBusy) return;
        _fsSyncBusy = true;
        try {
          _unityModule.FS.syncfs(false, function (err) {
            _fsSyncBusy = false;
            if (err) console.warn("[AllStars] FS.syncfs error:", err);
            else     console.log("[AllStars] Save flushed to IndexedDB.");
          });
        } catch (e) {
          _fsSyncBusy = false;
          console.warn("[AllStars] FS.syncfs threw:", e);
        }
      }

      // Flush whenever saves are likely to have happened
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") persistSaves();
      });
      window.addEventListener("blur",         persistSaves);
      window.addEventListener("beforeunload", persistSaves);
      // Periodic flush every 20 s (catches mid-session saves)
      setInterval(persistSaves, 20_000);

      // ── Background-throttle prevention ────────────────────────────────────────
      // Browsers throttle rAF and timers in background tabs, which drops Unity
      // below 60 fps when the window loses focus. A Web Worker runs at full speed
      // regardless of tab visibility — we use it to ping the page and keep timers alive.
      const _workerSrc = `
        let iv = setInterval(() => self.postMessage('tick'), 200);
      `;
      try {
        const blob   = new Blob([_workerSrc], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        // The message just keeps the event loop warm; Unity's own rAF handles rendering.
        worker.onmessage = () => {};
      } catch (_) { /* worker blocked by CSP — not critical */ }

      // ── Crash recovery ────────────────────────────────────────────────────────
      // Unity calls window.alert() on a fatal WASM exception. We intercept it,
      // flush saves first, then offer a one-click restart instead of freezing.
      const _origAlert = window.alert.bind(window);
      window.alert = function (msg) {
        if (typeof msg === 'string' && msg.toLowerCase().includes('error')) {
          console.error('[AllStars] Unity fatal error:', msg);
          persistSaves();
          showCrashOverlay(msg);
        } else {
          _origAlert(msg);
        }
      };

      // Also catch the Unity "Halting program" path which goes through console.error
      const _origConsoleError = console.error.bind(console);
      console.error = function (...args) {
        _origConsoleError(...args);
        const msg = args.join(' ');
        if (msg.includes('Halting program') || msg.includes('Uncaught exception from main loop')) {
          persistSaves();
          showCrashOverlay(msg);
        }
      };

      function showCrashOverlay(msg) {
        // Only show once
        if (document.getElementById('crash-overlay')) return;
        persistSaves();
        const el = document.createElement('div');
        el.id = 'crash-overlay';
        el.style.cssText = `
          position:absolute;inset:0;background:rgba(0,0,0,.85);
          display:flex;flex-direction:column;align-items:center;
          justify-content:center;gap:16px;z-index:99;
          font-family:'Segoe UI',system-ui,sans-serif;color:#fff;padding:24px;
          text-align:center;
        `;
        el.innerHTML = `
          <div style="font-size:clamp(14px,2.5vw,22px);font-weight:700;letter-spacing:.1em;">
            Game Crashed
          </div>
          <div style="font-size:clamp(10px,1.3vw,12px);color:#888;max-width:340px;word-break:break-word;">
            Your progress has been saved. Reload to continue.
          </div>
          <button onclick="location.reload()" style="
            margin-top:8px;padding:10px 28px;border:none;border-radius:6px;
            background:linear-gradient(90deg,#4a9eff,#9b59ff);
            color:#fff;font-size:clamp(12px,1.5vw,14px);font-weight:600;
            cursor:pointer;letter-spacing:.08em;
          ">Reload Game</button>
        `;
        container.appendChild(el);
      }

      // ── Streaming download ────────────────────────────────────────────────────
      async function fetchDataWithProgress(url) {
        setStatus("Connecting…");
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const contentLength = parseInt(response.headers.get("Content-Length") || "0");
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        setStatus("Downloading… 0%");

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (contentLength > 0) {
            const pct = (received / contentLength) * 80;
            setProgress(pct);
            setStatus(`Downloading… ${Math.round(received / contentLength * 100)}%`);
          } else {
            setStatus(`Downloading… ${(received / 1048576).toFixed(1)} MB`);
          }
        }

        const total  = chunks.reduce((s, c) => s + c.length, 0);
        const merged = new Uint8Array(total);
        let   offset = 0;
        for (const c of chunks) { merged.set(c, offset); offset += c.length; }
        return URL.createObjectURL(new Blob([merged], { type: "application/octet-stream" }));
      }

      // ── Boot ──────────────────────────────────────────────────────────────────
      async function boot() {
        let dataObjectUrl;
        try {
          dataObjectUrl = await fetchDataWithProgress(DATA_URL);
        } catch (err) {
          setStatus("Download failed: " + err.message);
          console.error(err);
          return;
        }

        setStatus("Starting…");
        setProgress(85);

        const buildUrl = "Build";
        const config = {
          arguments:          [],
          dataUrl:            dataObjectUrl,
          frameworkUrl:       buildUrl + "/all stars webgl port.framework.js",
          codeUrl:            buildUrl + "/all stars webgl port.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName:        "Drippy Studios",
          productName:        "All Stars",
          productVersion:     "3.0.27463.4823",
          showBanner:         showWarning,
        };

        await new Promise((resolve, reject) => {
          const s   = document.createElement("script");
          s.src     = buildUrl + "/all stars webgl port.loader.js";
          s.onload  = resolve;
          s.onerror = () => reject(new Error("Failed to load loader script"));
          document.body.appendChild(s);
        });

        setProgress(90);

        try {
          const unityInstance = await createUnityInstance(canvas, config, (progress) => {
            setProgress(90 + progress * 10);
            if (progress < 1) setStatus(`Loading… ${Math.round(90 + progress * 10)}%`);
          });

          URL.revokeObjectURL(dataObjectUrl);
          setProgress(100);

          // Wire up the FS reference so persistSaves() can reach it
          _unityModule = unityInstance.Module;

          // Initial sync — mounts the IDBFS and loads any existing save data
          setTimeout(persistSaves, 2000);

          overlay.classList.add("fade-out");
          setTimeout(() => { overlay.classList.add("hidden"); }, 600);

          // Show volume panel
          volPanel.classList.add("ready");

          document.getElementById("unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          resize();
        } catch (msg) {
          setStatus("Error: " + msg);
          console.error(msg);
        }
      }

      boot();
    </script>
  </body>
</html>
