<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>All Stars</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="All Stars">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function (err) {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      /* ── Wrapper that holds canvas + overlay, always centered ── */
      #unity-container {
        position: relative;
        /* size set by JS after we know the viewport */
        flex-shrink: 0;
      }

      #unity-canvas {
        display: block;
        background: #111;
        /* fill whatever size the container is */
        width: 100%;
        height: 100%;
      }

      /* ── Loading overlay ── */
      #loading-overlay {
        position: absolute;
        inset: 0;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading-overlay.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loading-overlay.hidden {
        display: none;
      }

      #game-title {
        color: #ffffff;
        font-size: clamp(18px, 3vw, 30px);
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      #status-text {
        color: #777;
        font-size: clamp(11px, 1.5vw, 13px);
        letter-spacing: 0.06em;
      }

      #progress-track {
        width: min(260px, 60%);
        height: 4px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4a9eff, #9b59ff);
        border-radius: 2px;
        transition: width 0.25s ease;
      }

      /* ── Footer ── */
      #unity-footer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 6px 8px;
        background: rgba(0,0,0,0.4);
        pointer-events: none;
        z-index: 5;
      }
      #unity-build-title {
        color: #444;
        font-size: 12px;
        margin-right: 8px;
        pointer-events: none;
      }
      #unity-fullscreen-button {
        cursor: pointer;
        width: 32px;
        height: 32px;
        background: url('TemplateData/fullscreen-button.png') no-repeat center;
        background-size: contain;
        opacity: 0.5;
        transition: opacity 0.2s;
        pointer-events: all;
      }
      #unity-fullscreen-button:hover { opacity: 1; }

      /* ── Warning banner ── */
      #unity-warning {
        position: absolute;
        left: 50%;
        top: 8%;
        transform: translate(-50%);
        z-index: 20;
        display: none;
        max-width: min(420px, 90%);
        text-align: center;
      }
      #unity-warning div {
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 12px;
        color: #333;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="loading-overlay">
        <div id="game-title">All Stars</div>
        <div id="progress-track"><div id="progress-fill"></div></div>
        <div id="status-text">Initializing…</div>
      </div>

      <div id="unity-warning"></div>

      <div id="unity-footer">
        <div id="unity-build-title">All Stars</div>
        <div id="unity-fullscreen-button" title="Fullscreen"></div>
      </div>
    </div>

    <script>
      // ── Config ──────────────────────────────────────────────────────────────
      const GAME_ASPECT = 960 / 600;   // native aspect ratio
      const DATA_URL =
        "https://media.githubusercontent.com/media/nulltronprime/openglwebbuild/main/Build/all%20stars%20webgl%20port.data";

      // ── Elements ─────────────────────────────────────────────────────────────
      const container   = document.getElementById("unity-container");
      const canvas      = document.getElementById("unity-canvas");
      const overlay     = document.getElementById("loading-overlay");
      const statusEl    = document.getElementById("status-text");
      const progressEl  = document.getElementById("progress-fill");

      // ── Helpers ───────────────────────────────────────────────────────────────
      function setProgress(pct) {
        progressEl.style.width = Math.min(100, Math.round(pct)) + "%";
      }
      function setStatus(msg) {
        statusEl.textContent = msg;
      }
      function showWarning(msg, type) {
        const w   = document.getElementById("unity-warning");
        const div = document.createElement("div");
        div.textContent = msg;
        div.style.background = type === "error" ? "#ffe0e0" : "#fffbe6";
        w.appendChild(div);
        w.style.display = "block";
        if (type !== "error")
          setTimeout(() => { div.remove(); if (!w.children.length) w.style.display = "none"; }, 6000);
      }

      // ── Responsive sizing ─────────────────────────────────────────────────────
      function resize() {
        // Leave a small margin so nothing is clipped. On mobile use full window.
        const maxW = window.innerWidth;
        const maxH = window.innerHeight;

        let w, h;
        if (maxW / maxH > GAME_ASPECT) {
          // viewport is wider than the game → fit to height
          h = maxH;
          w = Math.round(h * GAME_ASPECT);
        } else {
          // viewport is taller than the game → fit to width
          w = maxW;
          h = Math.round(w / GAME_ASPECT);
        }

        container.style.width  = w + "px";
        container.style.height = h + "px";
        canvas.width  = w;
        canvas.height = h;
      }

      resize();
      window.addEventListener("resize", resize);

      // ── Streaming download ────────────────────────────────────────────────────
      async function fetchDataWithProgress(url) {
        setStatus("Connecting…");
        const response = await fetch(url, { mode: "cors" });
        if (!response.ok) throw new Error(`HTTP ${response.status} fetching game data`);

        const contentLength = parseInt(response.headers.get("Content-Length") || "0");
        const reader = response.body.getReader();
        const chunks = [];
        let received = 0;

        setStatus("Downloading… 0%");

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (contentLength > 0) {
            const pct = (received / contentLength) * 80;
            setProgress(pct);
            setStatus(`Downloading… ${Math.round(received / contentLength * 100)}%`);
          } else {
            setStatus(`Downloading… ${(received / 1048576).toFixed(1)} MB`);
          }
        }

        const total  = chunks.reduce((s, c) => s + c.length, 0);
        const merged = new Uint8Array(total);
        let offset   = 0;
        for (const c of chunks) { merged.set(c, offset); offset += c.length; }

        return URL.createObjectURL(new Blob([merged], { type: "application/octet-stream" }));
      }

      // ── Boot ──────────────────────────────────────────────────────────────────
      async function boot() {
        let dataObjectUrl;
        try {
          dataObjectUrl = await fetchDataWithProgress(DATA_URL);
        } catch (err) {
          setStatus("Download failed: " + err.message);
          console.error(err);
          return;
        }

        setStatus("Starting game…");
        setProgress(85);

        const buildUrl = "Build";
        const config = {
          arguments:          [],
          dataUrl:            dataObjectUrl,
          frameworkUrl:       buildUrl + "/all stars webgl port.framework.js",
          codeUrl:            buildUrl + "/all stars webgl port.wasm",
          streamingAssetsUrl: "StreamingAssets",
          companyName:        "Drippy Studios",
          productName:        "All Stars",
          productVersion:     "3.0.27463.4823",
          showBanner:         showWarning,
        };

        // Load Unity loader script
        await new Promise((resolve, reject) => {
          const s    = document.createElement("script");
          s.src      = buildUrl + "/all stars webgl port.loader.js";
          s.onload   = resolve;
          s.onerror  = () => reject(new Error("Failed to load Unity loader script"));
          document.body.appendChild(s);
        });

        setProgress(90);

        try {
          const unityInstance = await createUnityInstance(canvas, config, (progress) => {
            setProgress(90 + progress * 10);
            if (progress < 1) setStatus(`Loading… ${Math.round(90 + progress * 10)}%`);
          });

          URL.revokeObjectURL(dataObjectUrl);
          setProgress(100);
          overlay.classList.add("fade-out");
          setTimeout(() => { overlay.classList.add("hidden"); }, 600);

          document.getElementById("unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          // Re-apply sizing after Unity is loaded (it can override canvas size)
          resize();
        } catch (msg) {
          setStatus("Error: " + msg);
          console.error(msg);
        }
      }

      boot();
    </script>
  </body>
</html>
