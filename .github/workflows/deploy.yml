name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          submodules: recursive

      - name: Ensure LFS files are materialized
        run: |
          git lfs install
          git lfs pull
          git lfs checkout
          ls -la Build/
          file Build/unitywebglbuild.data

      - name: Verify no LFS pointers
        run: |
          git lfs install
          git lfs pull
          git lfs checkout
          echo "=== Checking data file ==="
          head -c 100 Build/unitywebglbuild.data
          echo ""
          if grep -q "version https://git-lfs.github.com/spec" Build/unitywebglbuild.data; then
            echo "ERROR: Still have LFS pointer!"
            exit 1
          fi
          echo "SUCCESS: Data file is real binary"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4